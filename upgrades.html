<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrades | CoC Elite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    
    <header class="header-bar">
        <button class="menu-trigger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">UPGRADE<span>TRACKER</span></div>
        <div style="width:40px"></div> <!-- For balancing -->
    </header>
    
    <div class="overlay" onclick="toggleMenu()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="logo">ELITE<span>TRACKER</span></div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-th-large"></i> DASHBOARD</a></li>
            <li><a href="history.html"><i class="fas fa-history"></i> HISTORY</a></li>
            <li><a href="upgrades.html" class="active"><i class="fas fa-hammer"></i> UPGRADES</a></li>
        </ul>
    </aside>
    
    <main class="container">
        <!-- Add Upgrade Form -->
        <div class="card">
            <label style="font-size: 0.8rem; color: var(--text-dim);">SELECT ALARM SOUND:</label>
            <select id="soundSelect" class="input-field">
                <option value="">Loading sounds...</option>
            </select>
            <h3 style="font-family:'Rajdhani'; color:var(--accent); margin-bottom:15px;"><i class="fas fa-plus-circle"></i> ADD UPGRADE</h3>
            <select id="accSelect" class="input-field"></select>
            <input type="text" id="upName" placeholder="Item Name (e.g. Eagle Artillery)" class="input-field">
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                <input type="number" id="days" placeholder="DD" class="input-field" style="text-align:center">
                <input type="number" id="hours" placeholder="HH" class="input-field" style="text-align:center">
                <input type="number" id="mins" placeholder="MM" class="input-field" style="text-align:center">
            </div>
            <button onclick="addUpgrade()" class="btn btn-p" style="margin-top:10px; font-family:'Rajdhani'">START UPGRADE</button>
        </div>
        
        <div id="upgrades-list" class="grid" style="margin-top:30px;"></div>
    </main>
    
    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <script src="js/upgrades.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }
    </script>
</body>

</html>
