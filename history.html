<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | CoC Elite</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    
    <header class="header-bar">
        <button class="menu-trigger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">ELITE<span>ARCHIVES</span></div>
        <div style="display:flex; gap:10px;">
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <button class="btn-m" onclick="exportData()" style="width:40px; height:40px; border-radius:10px;"><i class="fas fa-download"></i></button>
            <button class="btn-m" onclick="document.getElementById('importFile').click()" style="width:40px; height:40px; border-radius:10px; background:var(--cyan); color:#000;"><i class="fas fa-upload"></i></button>
        </div>
    </header>
    
    <div class="overlay" onclick="toggleMenu()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="logo">ELITE<span>TRACKER</span></div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-th-large"></i> DASHBOARD</a></li>
            <li><a href="history.html" class="active"><i class="fas fa-history"></i> HISTORY</a></li>
            <li><a href="upgrades.html"><i class="fas fa-hammer"></i> UPGRADES</a></li>
        </ul>
    </aside>
    
    <main class="container">
        <div id="history-list" style="display:flex; flex-direction:column; gap:20px;">
            <!-- History Cards Injected Here -->
        </div>
    </main>
    
    <script src="js/history.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker Registered"));
        }
        
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }
    </script>
</body>

</html>
